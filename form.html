<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Hexlet Series — Добавить сериал</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="Страница формы для добавления нового сериала."
  >
  <link rel="icon" href="Image/logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="Image/logo.svg">
  <link rel="stylesheet" href="style/reset.css">
  <link rel="stylesheet" href="style/style.css">
</head>
<body>

  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">
        <img src="Image/logo.svg" alt="Логотип Hexlet Series" width="32" height="32">
        <span>Hexlet Series</span>
      </a>

      <button class="burger" id="burger" aria-label="Открыть меню">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="nav" id="nav">
        <a href="index.html" class="nav__link">Главная</a>
        <a href="form.html" class="nav__link nav__link--active">Добавить сериал</a>
        <a href="about.html" class="nav__link">О проекте</a>
        <a href="contact.html" class="nav__link">Контакты</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <header class="section__header">
        <div>
          <h1 class="section__title">Добавить новый сериал</h1>
          <p class="section__subtitle">
            Заполни форму и сохрани сериал в общий список
          </p>
        </div>
      </header>

      <form id="seriesForm" class="contact-form">
  <div class="form-group">
    <label for="title" class="form-label">Название сериала</label>
    <input type="text" id="title" class="form-input" placeholder="Например: Breaking Bad">
  </div>

      <div class="form-group">
        <label for="category" class="form-label">Категория / жанр</label>
        <input type="text" id="category" class="form-input" placeholder="Например: Драма">
      </div>

      <div class="form-group">
        <label for="image" class="form-label">URL изображения</label>
        <input type="url" id="image" class="form-input" placeholder="https://...">
      </div>

      <div class="form-group">
        <label for="episodes" class="form-label">Всего серий</label>
        <input type="number" id="episodes" class="form-input" placeholder="Например: 62" min="1">
      </div>

      <div class="form-group">
        <label for="watched" class="form-label">Просмотрено серий</label>
        <input type="number" id="watched" class="form-input" placeholder="Например: 10" min="0">
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary">Сохранить</button>
        <a href="index.html" class="btn-secondary">На главную</a>
      </div>
     </form>
    </div>
  </main>

  <script type="module" src="js/form.js"></script>
</body>
</html>
