<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Каталог сериалов – Hexlet Series</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Каталог сериалов Hexlet Series с возможностью добавления и отслеживания прогресса.">
  <link rel="icon" href="Image/logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="Image/logo.svg">
  <link rel="stylesheet" href="style/reset.css">
  <link rel="stylesheet" href="style/style.css">
</head>
<body>

  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">
        <img src="Image/logo.svg" alt="Логотип Hexlet Series" width="32" height="32">
        <span>HEXLET SERIES</span>
      </a>

      <button class="burger" id="burger" aria-label="Открыть меню">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="nav" id="nav">
        <a href="index.html" class="nav__link">Главная</a>
        <a href="catalog.html" class="nav__link nav__link--active">Каталог</a>
        <a href="about.html" class="nav__link">О проекте</a>
        <a href="contact.html" class="nav__link">Контакты</a>
        <button class="header__cta header__cta--mobile" type="button">Профиль</button>
      </nav>

      <button class="header__cta header__cta--desktop" type="button">Профиль</button>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <header class="section__header">
        <div>
          <h1 class="section__title">Каталог сериалов</h1>
          <p class="section__subtitle">
            Добавляй сериалы и отслеживай просмотренные серии.
          </p>
        </div>
      </header>

     <section class="add-series">
  <h2 class="section__title section__title--small">Добавить сериал</h2>

  <form id="seriesForm" class="contact-form">
    <input type="text" id="title" placeholder="Название сериала" required>

    <input
      type="url"
      id="image"
      placeholder="URL фото сериала (https://...)"
    >

    <input
      type="number"
      id="episodes"
      placeholder="Всего серий"
      min="1"
      required
    >

    <input
      type="number"
      id="watched"
      placeholder="Просмотрено серий"
      min="0"
      required
    >

    <button type="submit" class="btn-primary">Добавить сериал</button>
  </form>
</section>

      <section class="section section--compact">
        <div class="products" id="seriesList"></div>
      </section>
    </div>
  </main>

  <div class="modal" id="authModal">
    <div class="modal__content">
      <span class="modal__close" id="closeModal">&times;</span>
      <h2>Вход / Регистрация</h2>

      <form class="modal__form">
        <input type="text" placeholder="Имя" required>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Пароль" required>
        <button class="btn-primary" type="submit">Войти</button>
      </form>
    </div>
  </div>

    <script type="module" src="js/main.js"></script></body>
</html>
