<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Hexlet Series — Контакты</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="Контакты проекта Hexlet Series."
  >
  <link rel="icon" href="Image/logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="Image/logo.svg">
  <link rel="stylesheet" href="style/reset.css">
  <link rel="stylesheet" href="style/style.css">
</head>
<body>

  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">
        <img src="Image/logo.svg" alt="Логотип Hexlet Series" width="32" height="32">
        <span>Hexlet Series</span>
      </a>

      <button class="burger" id="burger" aria-label="Открыть меню">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="nav" id="nav">
        <a href="index.html" class="nav__link">Главная</a>
        <a href="form.html" class="nav__link">Добавить сериал</a>
        <a href="about.html" class="nav__link">О проекте</a>
        <a href="contact.html" class="nav__link nav__link--active">Контакты</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <header class="section__header">
        <div>
          <h1 class="section__title">Контакты</h1>
          <p class="section__subtitle">Форма обратной связи</p>
        </div>
      </header>

      <form class="contact-form">
        <input type="text" placeholder="Ваше имя">
        <input type="email" placeholder="Ваш email">
        <textarea rows="6" placeholder="Ваше сообщение"></textarea>
        <button type="submit" class="btn-primary">Отправить</button>
      </form>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <div>© 2026 Hexlet Series</div>
      <div class="footer__links">
        <a href="index.html">Главная</a>
        <a href="form.html">Добавить</a>
        <a href="about.html">О проекте</a>
      </div>
    </div>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
