<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Контакты – Hexlet Series</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Контакты проекта Hexlet Series.">
  <link rel="icon" href="Image/logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="Image/logo.svg">
  <link rel="stylesheet" href="style/reset.css">
  <link rel="stylesheet" href="style/style.css">
</head>
<body>

  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">
        <img src="Image/logo.svg" alt="Логотип Hexlet Series" width="32" height="32">
        <span>HEXLET SERIES</span>
      </a>

      <button class="burger" id="burger" aria-label="Открыть меню">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="nav" id="nav">
        <a href="index.html" class="nav__link">Главная</a>
        <a href="catalog.html" class="nav__link">Каталог</a>
        <a href="about.html" class="nav__link">О проекте</a>
        <a href="contact.html" class="nav__link nav__link--active">Контакты</a>
        <button class="header__cta header__cta--mobile" type="button">Профиль</button>
      </nav>

      <button class="header__cta header__cta--desktop" type="button">Профиль</button>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <header class="section__header">
        <div>
          <h1 class="section__title">Контакты</h1>
          <p class="section__subtitle">
            Форма обратной связи по проекту
          </p>
        </div>
      </header>

      <form class="contact-form">
        <input type="text" placeholder="Ваше имя" required>
        <input type="email" placeholder="Ваш email" required>
        <textarea placeholder="Ваше сообщение" rows="6" required></textarea>
        <button type="submit" class="btn-primary">Отправить</button>
      </form>
    </div>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
